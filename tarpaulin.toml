# cargo-tarpaulin configuration.
#
# Coverage includes the benchmark (`benches/parsing.rs`) alongside the unit
# tests. The benchmark is the primary exercise of the multi-dialect
# `BenchParser` layer in `src/lib.rs`, so running it under coverage exercises
# the dialect mappings and every parser's accept/reprint paths.
#
# `args = ["--test"]` runs the benchmark in smoke (verify-only) mode rather than
# doing full timed measurement, which would be prohibitively slow under
# instrumentation. That smoke path does not auto-extract, so extract the corpus
# first with `tar --zstd -xf datasets.tar.zst`, or the bench paths are skipped
# and lib coverage drops accordingly.
#
# Usage: cargo tarpaulin
[default]
engine = "Llvm"
run-types = ["Tests", "Benchmarks"]
args = ["--test"]
