<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SQL parser benchmark logo: an abstract syntax tree">
  <title>SQL Parser Benchmark</title>
  <!-- Rounded tile background in the site accent color. -->
  <rect width="64" height="64" rx="14" fill="#0f4c81"/>
  <!-- An abstract syntax tree: a root branching to two nodes, each branching
       again, evoking SQL parsed into an AST. Edges first, then nodes on top. -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85" fill="none">
    <path d="M32 17 L18 32"/>
    <path d="M32 17 L46 32"/>
    <path d="M18 32 L12 47"/>
    <path d="M18 32 L24 47"/>
    <path d="M46 32 L40 47"/>
    <path d="M46 32 L52 47"/>
  </g>
  <g fill="#ffffff">
    <circle cx="32" cy="17" r="6"/>
    <circle cx="18" cy="32" r="5"/>
    <circle cx="46" cy="32" r="5"/>
  </g>
  <!-- Leaf nodes tinted to suggest accepted (green) vs rejected (coral) -->
  <g>
    <circle cx="12" cy="47" r="4.5" fill="#3ddc97"/>
    <circle cx="24" cy="47" r="4.5" fill="#ffffff"/>
    <circle cx="40" cy="47" r="4.5" fill="#ffffff"/>
    <circle cx="52" cy="47" r="4.5" fill="#ff6f61"/>
  </g>
</svg>
