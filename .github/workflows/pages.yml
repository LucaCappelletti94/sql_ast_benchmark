name: Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "viz/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Build the committed web/ + viz/ crates only (no benchmark run), then deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.9 --locked
      - name: Build web app
        working-directory: web
        run: dx build --web --release
      - name: Stage site
        run: |
          set -eu
          OUT="target/dx/sql_ast_benchmark_web/release/web/public"
          rm -rf _site
          mkdir -p _site
          cp -r "$OUT"/. _site/
          cp _site/index.html _site/404.html   # SPA client-side routing fallback
          touch _site/.nojekyll
          echo "sql-ast-benchmark.luca.phd" > _site/CNAME   # custom Pages domain
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
